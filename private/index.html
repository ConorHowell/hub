<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Private Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #04040d;
      --surface: #080814;
      --surface2:#0d0d1f;
      --border:  rgba(160,170,220,0.1);
      --text:    #c0cce8;
      --muted:   #4a5472;
      --amber:   #f0a830;
      --silver:  #a8b8d0;
    }

    body {
      background:
        radial-gradient(ellipse 70% 55% at 8% 85%, rgba(180,100,20,.06) 0%, transparent 65%),
        radial-gradient(ellipse 55% 50% at 92% 10%, rgba(80,40,160,.07) 0%, transparent 65%),
        radial-gradient(ellipse 45% 40% at 50% 50%, rgba(20,10,60,.05) 0%, transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 1px; height: 1px;
      background: transparent;
      pointer-events: none; z-index: 0;
      box-shadow:
        45px 23px 0 0 rgba(210,225,255,.35), 123px 67px 0 0 rgba(210,225,255,.28),
        201px 145px 0 0 rgba(210,225,255,.3), 312px 89px 0 0 rgba(210,225,255,.25),
        456px 34px 0 0 rgba(210,225,255,.32), 534px 178px 0 0 rgba(210,225,255,.27),
        678px 56px 0 0 rgba(210,225,255,.3), 789px 134px 0 0 rgba(210,225,255,.25),
        901px 78px 0 0 rgba(210,225,255,.28), 1023px 201px 0 0 rgba(210,225,255,.3),
        1145px 45px 0 0 rgba(210,225,255,.25), 1267px 167px 0 0 rgba(210,225,255,.32),
        1389px 89px 0 0 rgba(210,225,255,.27), 1512px 234px 0 0 rgba(210,225,255,.3),
        1634px 56px 0 0 rgba(210,225,255,.25), 1756px 145px 0 0 rgba(210,225,255,.28),
        89px 312px 0 0 rgba(210,225,255,.22), 234px 278px 0 0 rgba(210,225,255,.25),
        378px 345px 0 0 rgba(210,225,255,.2), 512px 289px 0 0 rgba(210,225,255,.22),
        667px 367px 0 0 rgba(210,225,255,.18), 801px 301px 0 0 rgba(210,225,255,.2),
        167px 156px 1px 0 rgba(230,240,255,.5), 389px 112px 1px 0 rgba(230,240,255,.48),
        612px 189px 1px 0 rgba(230,240,255,.5), 834px 67px 1px 0 rgba(230,240,255,.45),
        256px 89px 1px 1px rgba(200,230,255,.7), 734px 145px 1px 1px rgba(200,230,255,.65),
        1189px 56px 2px 0 rgba(200,230,255,.7), 489px 201px 2px 0 rgba(220,240,255,.6),
        145px 45px 1px 0 rgba(150,200,255,.6), 567px 123px 1px 0 rgba(150,200,255,.55),
        67px 456px 0 0 rgba(210,225,255,.15), 345px 423px 0 0 rgba(210,225,255,.12),
        623px 489px 0 0 rgba(210,225,255,.15), 901px 412px 0 0 rgba(210,225,255,.12);
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,20,0.04) 3px, rgba(0,0,20,0.04) 4px
      );
      pointer-events: none; z-index: 0;
    }

    @media (prefers-reduced-motion: reduce) { body::before, body::after { display: none; } }

    .wrapper {
      position: relative; z-index: 1;
      width: 100%; max-width: 740px;
      display: flex; flex-direction: column; gap: 2.5rem;
    }

    .console-header {
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0;
    }

    .header-top { display: flex; align-items: center; gap: 1.5rem; }

    .reticle {
      width: 44px; height: 44px;
      border: 1px solid rgba(240,168,48,0.55);
      border-radius: 50%;
      position: relative;
      animation: spin 20s linear infinite;
      flex-shrink: 0;
    }
    .reticle::before {
      content: ''; position: absolute; top: 50%; left: 10%;
      width: 80%; height: 1px; background: rgba(240,168,48,0.4); transform: translateY(-50%);
    }
    .reticle::after {
      content: ''; position: absolute; left: 50%; top: 10%;
      width: 1px; height: 80%; background: rgba(240,168,48,0.4); transform: translateX(-50%);
    }
    .reticle-inner {
      position: absolute; top: calc(50% - 4px); left: calc(50% - 4px);
      width: 8px; height: 8px; background: rgba(240,168,48,0.7); border-radius: 50%;
      animation: counter-spin 20s linear infinite;
    }
    .reticle-right { animation-direction: reverse; }
    .reticle-right .reticle-inner { animation-direction: reverse; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes counter-spin { to { transform: rotate(-360deg); } }

    .header-center { flex: 1; }

    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    .hub-title {
      font-size: 2.2rem; font-weight: 800; letter-spacing: .18em; text-transform: uppercase;
      background: linear-gradient(135deg, #8ab8d8 0%, #e0ecf8 45%, #a0b8cc 55%, #8ab8d8 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 28px rgba(240,168,48,0.28));
      animation: shimmer 6s ease-in-out infinite;
    }

    .hub-coords {
      font-family: 'Courier New', monospace;
      font-size: .62rem; letter-spacing: .14em; text-transform: uppercase;
      color: rgba(240,168,48,0.65); margin-top: .5rem;
    }

    .header-divider {
      height: 1px; width: 60%; margin-top: 1.5rem;
      background: linear-gradient(90deg, transparent, rgba(240,168,48,0.3), transparent);
    }

    .project-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; align-items: start;
    }
    @media (max-width: 600px) { .project-grid { grid-template-columns: 1fr; } }

    .project-panel {
      position: relative;
      background: linear-gradient(145deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid rgba(var(--accent-rgb), 0.18);
      border-radius: 10px; padding: 1.75rem;
      display: flex; flex-direction: column; gap: 1rem;
      transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      animation: panelIn .5s ease both; overflow: hidden;
    }
    .project-panel:nth-child(1) { animation-delay: .1s; }
    .project-panel:nth-child(2) { animation-delay: .25s; }

    @keyframes panelIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .project-panel:hover {
      transform: translateY(-6px);
      border-color: rgba(var(--accent-rgb), 0.55);
      box-shadow: 0 0 40px rgba(var(--accent-rgb), 0.14), 0 8px 32px rgba(0,0,0,0.55),
                  inset 0 0 40px rgba(var(--accent-rgb), 0.04);
    }

    .panel-corners { position: absolute; inset: 0; pointer-events: none; }
    .corner {
      position: absolute; width: 13px; height: 13px;
      border-color: var(--accent); border-style: solid; opacity: 0.4; transition: opacity .35s;
    }
    .corner.tl { top: 7px; left: 7px;   border-width: 2px 0 0 2px; }
    .corner.tr { top: 7px; right: 7px;  border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 7px; left: 7px;  border-width: 0 0 2px 2px; }
    .corner.br { bottom: 7px; right: 7px; border-width: 0 2px 2px 0; }
    .project-panel:hover .corner { opacity: 0.9; }

    .panel-badge {
      width: 32px; height: 32px; border-radius: 6px;
      background: rgba(var(--accent-rgb), 0.12); border: 1px solid rgba(var(--accent-rgb), 0.3);
      color: var(--accent); font-size: .65rem; font-weight: 800; letter-spacing: .08em;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    .panel-title {
      font-size: 1.05rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); text-shadow: 0 0 20px rgba(var(--accent-rgb), 0.4);
    }

    .panel-tools { display: flex; flex-direction: column; gap: .6rem; flex: 1; }

    .tool-link {
      display: flex; align-items: flex-start; gap: .65rem; text-decoration: none;
      padding: .65rem .75rem; border-radius: 6px;
      border: 1px solid rgba(var(--accent-rgb), 0.1); background: rgba(var(--accent-rgb), 0.04);
      transition: background .2s, border-color .2s, transform .2s;
    }
    .tool-link:hover {
      background: rgba(var(--accent-rgb), 0.1); border-color: rgba(var(--accent-rgb), 0.3);
      transform: translateX(3px);
    }

    .link-arrow {
      font-size: 1.2rem; color: var(--accent); opacity: .55; flex-shrink: 0;
      margin-top: .05rem; line-height: 1; transition: opacity .2s, transform .2s;
    }
    .tool-link:hover .link-arrow { opacity: 1; transform: translateX(3px); }

    .link-name {
      font-size: .85rem; font-weight: 700; color: var(--text); letter-spacing: .04em;
      transition: color .2s;
    }
    .tool-link:hover .link-name { color: #fff; }

    .link-desc { font-size: .7rem; color: var(--muted); line-height: 1.45; margin-top: .2rem; }

    .console-footer {
      text-align: center; font-family: 'Courier New', monospace;
      font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--muted); opacity: .5;
    }

    @media (prefers-reduced-motion: reduce) {
      .reticle, .reticle-inner { animation: none; }
      .hub-title { animation: none; }
      .project-panel { animation: none; }
      .project-panel:hover { transform: none; }
      .tool-link:hover { transform: none; }
      .link-arrow { transition: none; }
    }

    /* Auth overlay */
    .auth-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(4,4,13,0.97);
      display: flex; align-items: center; justify-content: center;
    }

    .auth-card {
      background: linear-gradient(145deg, #080814 0%, #0d0d1f 100%);
      border: 1px solid rgba(240,168,48,0.25);
      border-radius: 12px; padding: 2.5rem; width: 340px;
      display: flex; flex-direction: column; gap: 1rem;
    }

    .auth-card h2 {
      font-size: 1.4rem; font-weight: 800; letter-spacing: .18em; text-transform: uppercase;
      background: linear-gradient(135deg, #8ab8d8 0%, #e0ecf8 45%, #a0b8cc 55%, #8ab8d8 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      filter: drop-shadow(0 0 20px rgba(240,168,48,0.25));
    }

    .auth-card p { font-size: .8rem; color: #4a5472; margin: 0; }

    .auth-card input[type="password"] {
      width: 100%; padding: .65rem .85rem;
      background: #04040d; border: 1px solid rgba(160,170,220,0.15);
      border-radius: 6px; color: #c0cce8; font-size: .9rem; outline: none;
      transition: border-color .2s;
    }
    .auth-card input[type="password"]:focus { border-color: rgba(240,168,48,0.55); }

    .auth-unlock-btn {
      padding: .65rem 1.5rem; background: #f0a830; color: #04040d;
      border: none; border-radius: 6px;
      font-size: .85rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase;
      cursor: pointer; transition: background .2s, transform .1s;
    }
    .auth-unlock-btn:hover { background: #f8bc50; }
    .auth-unlock-btn:active { transform: scale(0.98); }

    .auth-error { font-size: .75rem; color: #f87171; min-height: 1em; }

    @keyframes auth-shake {
      0%, 100% { transform: translateX(0); }
      15%  { transform: translateX(-8px); }
      30%  { transform: translateX(8px); }
      45%  { transform: translateX(-6px); }
      60%  { transform: translateX(6px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
    }
    .auth-shake { animation: auth-shake .45s ease; }
  </style>
</head>
<body>
  <script>
    (function() {
      var HASH = 'e47337cad53bb366c8544010832cbdb87c53ab7845773aa4621668f0eb3d2b5a';
      var KEY  = 'hh_auth';
      var TTL  = 86400000;

      function isAuthed() {
        try {
          var stored = sessionStorage.getItem(KEY);
          if (!stored) return false;
          var data = JSON.parse(stored);
          return data.hash === HASH && (Date.now() - data.timestamp) < TTL;
        } catch(e) { return false; }
      }

      function sha256(str) {
        return crypto.subtle.digest('SHA-256', new TextEncoder().encode(str))
          .then(function(buf) {
            return Array.from(new Uint8Array(buf))
              .map(function(b) { return b.toString(16).padStart(2,'0'); })
              .join('');
          });
      }

      function unlock() {
        var content = document.getElementById('page-content');
        if (content) content.style.display = '';
      }

      function showOverlay() {
        var overlay = document.createElement('div');
        overlay.className = 'auth-overlay';
        overlay.innerHTML =
          '<div class="auth-card" id="auth-card">' +
            '<h2>PRIVATE HUB</h2>' +
            '<p>Enter your password to continue</p>' +
            '<input type="password" id="auth-input" placeholder="Password" autocomplete="current-password" />' +
            '<button class="auth-unlock-btn" id="auth-submit">Unlock</button>' +
            '<div class="auth-error" id="auth-error"></div>' +
          '</div>';
        document.body.appendChild(overlay);

        var input = document.getElementById('auth-input');
        var btn   = document.getElementById('auth-submit');
        var err   = document.getElementById('auth-error');
        var card  = document.getElementById('auth-card');

        input.focus();

        function attempt() {
          var val = input.value;
          if (!val) return;
          sha256(val).then(function(hash) {
            if (hash === HASH) {
              sessionStorage.setItem(KEY, JSON.stringify({ hash: hash, timestamp: Date.now() }));
              overlay.remove();
              unlock();
            } else {
              err.textContent = 'Incorrect password';
              card.classList.remove('auth-shake');
              void card.offsetWidth;
              card.classList.add('auth-shake');
              input.value = '';
              input.focus();
            }
          });
        }

        btn.addEventListener('click', attempt);
        input.addEventListener('keydown', function(e) { if (e.key === 'Enter') attempt(); });
      }

      if (isAuthed()) {
        document.addEventListener('DOMContentLoaded', unlock);
      } else {
        document.addEventListener('DOMContentLoaded', function() { showOverlay(); });
      }
    })();
  </script>

  <div id="page-content" style="display:none">
    <div class="wrapper">

      <header class="console-header">
        <div class="header-top">
          <div class="reticle"><div class="reticle-inner"></div></div>
          <div class="header-center">
            <h1 class="hub-title">PRIVATE HUB</h1>
            <div class="hub-coords">PERSONAL ACCESS</div>
          </div>
          <div class="reticle reticle-right"><div class="reticle-inner"></div></div>
        </div>
        <div class="header-divider"></div>
      </header>

      <main class="project-grid">

        <div class="project-panel" style="--accent:#f0a830;--accent-rgb:240,168,48">
          <div class="panel-corners">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
          </div>
          <div class="panel-badge">AI</div>
          <div class="panel-title">AI AGENT</div>
          <div class="panel-tools">
            <a class="tool-link" href="https://chportfolio.us/hub/ai/">
              <span class="link-arrow">&#x203A;</span>
              <div class="link-info">
                <div class="link-name">AI Agent Hub</div>
                <div class="link-desc">Claude Code reference, bot templates, skill library, and setup guides.</div>
              </div>
            </a>
          </div>
        </div>

        <div class="project-panel" style="--accent:#70c890;--accent-rgb:112,200,144">
          <div class="panel-corners">
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>
          </div>
          <div class="panel-badge">HH</div>
          <div class="panel-title">HEALTH HELPER</div>
          <div class="panel-tools">
            <a class="tool-link" href="https://chportfolio.us/health/">
              <span class="link-arrow">&#x203A;</span>
              <div class="link-info">
                <div class="link-name">Health Helper</div>
                <div class="link-desc">Personal fitness tracker — sessions, exercise log, and progress dashboard.</div>
              </div>
            </a>
          </div>
        </div>

      </main>

      <footer class="console-footer">CONOR HOWELL &middot; PERSONAL ACCESS</footer>
    </div>
  </div>
</body>
</html>
